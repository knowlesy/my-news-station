name: Build and push image

# Quarterly build — the image only needs rebuilding when base
# dependencies (Playwright, Rust crates, apt packages) drift.
on:
  schedule:
    - cron: "0 3 1 1,4,7,10 *" # 03:00 UTC on the 1st of Jan/Apr/Jul/Oct
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "date=$(date +%Y-%m)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.date }}

      - name: Create GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          # Count existing tags for this date to generate sequence number
          COUNT=$(git tag -l "v${DATE}-*" 2>/dev/null | wc -l)
          SEQ=$((COUNT + 1))
          TAG="v${DATE}-$(printf "%03d" $SEQ)"

          # Extract changelog section for this date
          CHANGELOG=$(sed -n "/## \[${DATE}\]/,/## \[/p" CHANGELOG.md | head -n -1 | tail -n +2)

          # Create release
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "${CHANGELOG:-No changes documented}" \
            --target "${{ github.sha }}"

          echo "tag=$TAG" >> $GITHUB_OUTPUT
