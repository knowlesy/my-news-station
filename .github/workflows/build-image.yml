name: Build and push image

# Quarterly build — the image only needs rebuilding when base
# dependencies (Playwright, Rust crates, apt packages) drift.
on:
  schedule:
    - cron: "0 3 1 1,4,7,10 *" # 03:00 UTC on the 1st of Jan/Apr/Jul/Oct
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "date=$(date +%Y-%m)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.date }}
