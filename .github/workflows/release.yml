name: Tag and release on commit

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tag and release from commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          # Count tags on the REMOTE — the checkout here is shallow with no
          # tags fetched, so `git tag -l` always sees 0 and the second push
          # of the day would collide with the existing -001 tag.
          COUNT=$(git ls-remote --tags origin "refs/tags/v${DATE}-*" | grep -cv '\^{}' || true)
          SEQ=$((COUNT + 1))
          TAG="v${DATE}-$(printf "%03d" $SEQ)"

          MSG=$(git log -1 --pretty=%B)

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$MSG"
